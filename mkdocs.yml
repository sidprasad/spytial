site_name: sPyTial
site_description: Spatial Python visualization for structured data.
site_url: https://sidprasad.github.io/spytial/
repo_url: https://github.com/sidprasad/spytial
repo_name: sidprasad/spytial
edit_uri: edit/main/docs/
site_dir: site

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Playground: playground/index.html
  - How It Works: how-it-works.md
  - Diagramming: usage/diagramming.md
  - Sequences: usage/sequences.md
  - Evaluator: usage/evaluator.md
  - Operations: operations.md
  - Dataclass Builder: usage/dataclass-builder.md
  - Custom Relationalizers: relationalizers.md
  - CLRS Notebook Examples: examples/spytial-clrs.md
  - API Reference: reference/api.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_symbol_type_heading: true
            show_source: false
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_css:
  - stylesheets/extra.css

watch:
  - spytial
  - docs
