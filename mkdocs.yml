site_name: sPyTial
site_description: Spatial Python visualization for structured data.
site_url: https://sidprasad.github.io/cnd-py/
repo_url: https://github.com/sidprasad/cnd-py
repo_name: sidprasad/cnd-py
edit_uri: edit/main/docs/
site_dir: site

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Use sPyTial:
      - Diagramming: usage/diagramming.md
      - Evaluator: usage/evaluator.md
      - Operations: operations.md
      - Dataclass Builder: usage/dataclass-builder.md
      - Custom Relationalizers: relationalizers.md
      - CLRS Examples: examples/spytial-clrs.md
      - API Reference: reference/api.md
  - Develop sPyTial:
      - Overview: development/index.md
      - Python Integration: development/python-integration.md
      - Workflow: development/workflow.md
      - Docs and GitHub Pages: development/docs-site.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_symbol_type_heading: true
            show_source: false
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.inlinehilite

watch:
  - spytial
  - docs
